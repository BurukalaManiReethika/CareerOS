
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Generator</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
background:#f4f4f4;
}

.portfolio-container{
max-width:1200px;
margin:30px auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.form-panel,
.preview-panel{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

input,
textarea{
width:100%;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:8px;
}

textarea{
height:100px;
}

button{
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.preview{
padding:20px;
}

.project{
background:#f4f4f4;
padding:10px;
margin-top:10px;
border-radius:8px;
}

</style>
</head>
<body>

<header>
<h1 style="text-align:center;padding:20px;">
Portfolio Generator
</h1>
</header>

<div class="portfolio-container">

<div class="form-panel">

<input type="text" id="name" placeholder="Your Name">

<textarea id="bio" placeholder="Short Bio"></textarea>

<textarea id="skills" placeholder="Skills"></textarea>

<textarea id="projects" placeholder="Projects (one per line)"></textarea>

<button onclick="generatePortfolio()">
Generate Portfolio
</button>

</div>

<div class="preview-panel">

<div id="preview">

<h2>Portfolio Preview</h2>

</div>

</div>

</div>

<script src="js/portfolio.js"></script>

</body>
</html>
