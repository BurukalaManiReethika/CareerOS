
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CareerOS Roadmaps</title>

<link rel="stylesheet" href="css/style.css">

<style>

.container{
max-width:1200px;
margin:30px auto;
padding:20px;
}

.selector{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
}

.roadmap{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.step{
padding:15px;
margin:10px 0;
background:#f4f4f4;
border-left:5px solid #2563eb;
border-radius:8px;
font-size:18px;
}

</style>

</head>
<body>

<header>
<h1>Career Roadmaps</h1>
</header>

<div class="container">

<div class="selector">

<select id="track" onchange="showRoadmap()">

<option value="frontend">Frontend Developer</option>

<option value="backend">Backend Developer</option>

<option value="fullstack">Full Stack Developer</option>

<option value="aiml">AI / ML Engineer</option>

<option value="cyber">Cyber Security</option>

</select>

</div>

<div class="roadmap" id="roadmap"></div>

</div>

<script src="js/roadmap.js"></script>

</body>
</html>
